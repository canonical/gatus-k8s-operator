# This file configures Charmcraft.
# See https://documentation.ubuntu.com/charmcraft/stable/reference/files/charmcraft-yaml-file/
type: charm
name: gatus-k8s
title: Gatus Health Check and Monitoring Charm
summary: Deploy and manage Gatus, a powerful health check and monitoring service.
description: |
  Gatus is an automated health check and monitoring service designed to 
  ensure the reliability and uptime of your applications and infrastructure.

  This charm simplifies the deployment and management of Gatus on Kubernetes, 
  providing seamless integration with Juju and automated configuration.

  Gatus continuously monitors endpoints, services, and APIs, alerting you to 
  outages or performance issues before they impact users.

  Ideal for DevOps teams, SREs, and anyone responsible for maintaining service 
  reliability in cloud-native environments.

base: ubuntu@24.04
platforms:
  amd64:

extensions:
  - go-framework

config:
  options:
    announcements:
      description: |
        List of announcements to send.
        YAML structured with an `announcements` top-level key,
        same as the standard Gatus configuration file.
        See https://github.com/TwiN/gatus?tab=readme-ov-file#announcements.
      type: string
    endpoints:
      description: |
        List of endpoints to monitor.
        YAML structured with an `endpoints` top-level key,
        same as the standard Gatus configuration file.
        See https://github.com/TwiN/gatus?tab=readme-ov-file#endpoints.
      type: string
    log-level:
      description: |
        Configures the log level of Gatus.

        Acceptable values are: "info", "debug", "warn", "error" and "fatal"
      default: "info"
      type: string
    mattermost-alerting:
      description: |
        Juju Secret ID including secrets used for Mattermost alerting.

        The secret may contain the following keys:
          - default: The default webhook URL for Mattermost alerts.
            Required for any Mattermost alerting.
          - <channel-name>: Optional additional per-channel webhook URLs, e.g.
            team-name or alerts-channel. These can be referenced in
            the endpoints config using the [webhook-url:<channel-name>] placeholder
            syntax to specify per-endpoint webhook overrides.
      type: string
      default: ""
    mattermost-insecure:
      description: |
        Whether to use an insecure connection to Mattermost.
      type: boolean
      default: false
    oidc-redirect-path:
      description: |
        The callback path that Gatus listens on for the OAuth/OIDC redirect.
        This must match the path registered with your identity provider.
        Gatus uses /authorization-code/callback by default. Generally,
        you should not need to change this.
      type: string
      default: "/authorization-code/callback"
    oidc-scopes:
      description: |
        Space-separated list of OIDC scopes to request from the identity provider.
        The openid scope is mandatory and must always be included. Generally,
        you should not need to change this.
      type: string
      default: "openid"
    oidc-allowed-subjects:
      description: |
        Optional comma-separated list of subject identifiers (e.g. email addresses)
        that are allowed to access the Gatus dashboard after authenticating via the
        oauth relation. If empty, all authenticated users are allowed.
      type: string
      default: ""
    ui-header:
      description: |
        The header text to display in the Gatus UI.
      type: string
      default: "Gatus"
    ui-logo:
      description: |
        The logo to display in the Gatus UI. Defaults to the Gatus logo.
      type: string
      default: ""
    ui-dashboard-heading:
      description: |
        Dashboard title between header and endpoints.
      type: string
      default: "Health Dashboard"
    ui-dashboard-subheading:
      description: |
        Dashboard description between header and endpoints.
      type: string
      default: "Monitor the health of your endpoints in real-time"
    ui-dark-mode:
      description: |
        Whether to enable dark mode by default.
        Note that this is superseded by the user's operating system theme preferences.
      type: boolean
      default: true
    ui-default-sort-by:
      description: |
        Default sorting option for endpoints in the dashboard.
        Can be "name", "group", or "health".
        Note that user preferences override this.
      type: string
      default: "name"
    ui-default-filter-by:
      description: |
        Default filter option for endpoints in the dashboard.
        Can be "none", "failing", or "unstable".
        Note that user preferences override this.
      type: string
      default: "none"

requires:
  postgresql:
    interface: postgresql_client
    optional: true
    limit: 1
  oidc:
    interface: oauth
    optional: true
    limit: 1
