endpoints:
  - name: Trino
    group: Data
    url: "https://trino.example.com"
    interval: 60s
    conditions:
      - "[STATUS] == 200"
    alerts:
      - type: mattermost
        description: "Trino is down"
        send-on-resolved: true
        provider-override:
          webhook-url: "[secret:mm-webhook-channel-1]"
