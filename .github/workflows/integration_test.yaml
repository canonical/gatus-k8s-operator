name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

on:
  pull_request:
  workflow_call:

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    with:
      channel: 1.34-strict/stable
      modules: '["test_charm.py", "test_policy.py", "test_resources.py", "test_scaling.py", "test_upgrades.py", "test_catalog_updates.py"]'
      juju-channel: 3.6/stable
      self-hosted-runner: true
      self-hosted-runner-label: "xlarge"
      builder-runner-label: "xlarge"
      # microk8s-addons enables specific MicroK8s addons for the test environment.
      # metallb:10.15.119.2-10.15.119.4 configures MetalLB (bare metal load balancer) 
      # with an IP address pool range, providing 3 IPs for LoadBalancer-type services.
      # This private IP range (10.15.119.x) is suitable for isolated test environments.
      microk8s-addons: "dns ingress rbac storage metallb:10.15.119.2-10.15.119.4 registry"
      trivy-severity-config: CRITICAL
