name: Integration tests

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true
on:
  pull_request:
  workflow_call:

jobs:
  integration-tests:
    uses: canonical/operator-workflows/.github/workflows/integration_test.yaml@main
    secrets: inherit
    with:
      provider: k8s
      use-canonical-k8s: true
      channel: 1.33-classic/stable
      charmcraft-channel: latest/candidate
      modules: '["test_charm.py", "test_scaling.py", "test_vault.py", "test_postgres_db.py"]'
      juju-channel: 3.6/stable
      self-hosted-runner: true
      self-hosted-runner-label: xlarge
      self-hosted-runner-arch: x64
      self-hosted-runner-image: noble
      upload-image: "artifact"
      trivy-exit-code: '0'
      pre-run-script: .github/scripts/setup-artifact-import.sh
      test-timeout: 35
