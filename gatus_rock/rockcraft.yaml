name: gatus
base: ubuntu@24.04
version: '0.1'
summary: "Gatus: Automated health and uptime monitoring tool for your services."
description: |
    Gatus is an automated service health and uptime monitoring tool. It allows you to define endpoints to monitor, provides a real-time dashboard, and supports alerting via multiple channels when issues are detected. Gatus is designed to be simple to configure and deploy, making it ideal for ensuring the reliability of your services and infrastructure.
platforms:
    amd64:

services:
  go:
    override: replace
    summary: Gatus service
    command: /gatus/gatus_wrapper.sh
    working-dir: /gatus
    startup: enabled

parts:
  # go-deps:
  #   plugin: nil
  #   build-snaps:
  #     - go/1.25/stable
  #   override-build: |
  #     true

  gatus:
    plugin: go
    source: https://github.com/TwiN/gatus
    source-type: git
    source-tag: v5.32.0
    source-depth: 1
    organize:
      bin/gatus: gatus/bin/gatus
    build-snaps:
      - go/1.25/stable
    # after: [go-deps]
    build-environment:
      - CGO_ENABLED: "0"
    stage-packages:
      - bash
      - git

  add-ca-certificates:
    # This installs ca-certificates in the build env to populate our /etc/ssl/certs,
    # then copies just the ca-certificates.crt to the final image
    plugin: nil
    build-packages: 
      - ca-certificates
    override-build: |-
      mkdir -p $CRAFT_PART_INSTALL/etc/ssl/certs/
      cp /etc/ssl/certs/ca-certificates.crt $CRAFT_PART_INSTALL/etc/ssl/certs/ca-certificates.crt

  copy-files:
    plugin: dump
    source: .
    organize:
      gatus_wrapper.sh: gatus/gatus_wrapper.sh
    stage:
      - gatus
