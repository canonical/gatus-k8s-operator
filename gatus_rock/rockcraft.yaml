name: gatus
# see https://documentation.ubuntu.com/rockcraft/en/1.15.0/explanation/bases/
# for more information about bases and using 'bare' bases for chiselled rocks
base: bare # as an alternative, a ubuntu base can be used
build-base: ubuntu@24.04 # build-base is required when the base is bare
version: '0.4' # just for humans. Semantic versioning is recommended
summary: Gatus: Automated health and uptime monitoring tool for your services.
description: |
    This is gatus's description. You have a paragraph or two to tell the
    most important story about it. Keep it under 100 words though,
    we live in tweetspace and your description wants to look good in the
    container registries out there.
# the platforms this rock should be built on and run on.
# you can check your architecture with `dpkg --print-architecture`
platforms:
    amd64:
    # arm64:
    # ppc64el:
    # s390x:

# uncomment the sections you need and adjust according to your requirements.
parts:
  gatus:
    plugin: go
    source: https://github.com/TwiN/gatus
    source-type: git
    source-tag: v5.32.0
    source-depth: 1
    organize:
      bin/gatus: usr/local/bin/gatus
    build-snaps:
     - go/1.22/stable
    build-environment:
      - CGO_ENABLED: "0"
    stage-packages:
      - bash
      - git

  config:
    plugin: dump
    source: ./config
    organize:
      '*': config/
    stage:
      - config
